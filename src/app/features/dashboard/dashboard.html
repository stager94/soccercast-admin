<div class="mb-6">
  <h1 class="text-2xl font-semibold text-gray-900">Dashboard</h1>
</div>

<div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
  <div class="rounded-2xl border border-gray-200 bg-white p-5">
    <div class="flex items-center gap-3">
      <div class="flex h-11 w-11 items-center justify-center rounded-xl bg-brand-50 text-brand-600">
        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 21a9.004 9.004 0 0 0 8.716-6.747M12 21a9.004 9.004 0 0 1-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 0 1 7.843 4.582M12 3a8.997 8.997 0 0 0-7.843 4.582m15.686 0A11.953 11.953 0 0 1 12 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0 1 21 12c0 .778-.099 1.533-.284 2.253m-16.432 0A8.959 8.959 0 0 1 3 12c0-.778.099-1.533.284-2.253" />
        </svg>
      </div>
      <div>
        <p class="text-sm text-gray-500">Countries</p>
        <p class="text-xl font-semibold text-gray-900">{{ countriesCount() ?? '—' }}</p>
      </div>
    </div>
  </div>
</div>

<!-- API-Football Requests chart -->
<div class="mt-5 rounded-2xl border border-gray-200 bg-white p-4 md:p-6">
  <div class="mb-4 flex flex-wrap items-center justify-between gap-3">
    <div>
      <h2 class="text-base font-semibold text-gray-900">API-Football Requests</h2>
    </div>
    <div class="flex items-center gap-2">
      @if (!isToday()) {
        <button
          type="button"
          (click)="goToday()"
          class="rounded-lg border border-gray-200 px-3 py-1.5 text-xs font-medium text-gray-500 hover:bg-gray-50"
        >
          Today
        </button>
      }
      <input
        type="date"
        class="rounded-lg border border-gray-200 px-3 py-1.5 text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-brand-500"
        [value]="chartDate()"
        (change)="onDateChange($any($event.target).value)"
      />
    </div>
  </div>

  @if (chartLoading()) {
    <div class="flex h-48 items-center justify-center">
      <p class="text-sm text-gray-400">Loading…</p>
    </div>
  } @else if (chartError()) {
    <div class="rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-600">
      Failed to load chart data.
    </div>
  } @else if (chartSlots().length === 0) {
    <div class="flex h-48 items-center justify-center">
      <p class="text-sm text-gray-400">No data for this date.</p>
    </div>
  } @else {
    <app-resolution-chart [slots]="chartSlots()" />
  }
</div>
