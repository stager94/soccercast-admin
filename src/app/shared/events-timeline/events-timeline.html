@if (events().length === 0) {
  <p class="py-8 text-center text-sm text-gray-400">No events available</p>
} @else {
  <div class="flex flex-col gap-1">
    @for (item of items(); track $index) {
      @if (item.kind === 'ht') {
        <div class="my-2 flex items-center gap-3 text-xs font-semibold text-gray-500">
          <div class="h-px flex-1 bg-gray-200"></div>
          <span>HT {{ item.home }} – {{ item.away }}</span>
          <div class="h-px flex-1 bg-gray-200"></div>
        </div>
      } @else {
        <div
          class="flex items-center gap-3 rounded-lg px-3 py-2 hover:bg-gray-50"
          [class.flex-row-reverse]="item.side === 'home'"
        >
          <span class="w-10 shrink-0 text-xs font-medium text-gray-500"
            [class.text-right]="item.side === 'away'">
            {{ timeLabel(item.event) }}
          </span>
          <span class="shrink-0 text-base">{{ icon(item.event) }}</span>
          <div [class.text-right]="item.side === 'home'" class="flex-1">
            <span class="text-sm font-medium text-gray-800">{{ eventLabel(item.event) }}</span>
            <span class="ml-2 text-xs text-gray-400">{{ item.event.team.name }}</span>
          </div>
        </div>
      }
    }
  </div>
}
