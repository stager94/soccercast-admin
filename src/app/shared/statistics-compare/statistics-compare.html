@if (statistics().length === 0) {
  <p class="py-8 text-center text-sm text-gray-400">No statistics available</p>
} @else {
  <div class="flex flex-col gap-3">
    @for (row of rows(); track row.type) {
      <div>
        <div class="mb-1 flex items-center justify-between text-xs font-medium text-gray-500">
          <span>{{ row.homeRaw }}</span>
          <span class="text-gray-700">{{ row.type }}</span>
          <span>{{ row.awayRaw }}</span>
        </div>
        <div class="flex h-2 gap-0.5 overflow-hidden rounded-full">
          <div
            class="h-full rounded-l-full bg-brand-500 transition-all"
            [style.width.%]="row.homeWidth"
          ></div>
          <div
            class="h-full rounded-r-full bg-gray-300 transition-all"
            [style.width.%]="row.awayWidth"
          ></div>
        </div>
      </div>
    }
  </div>
}
